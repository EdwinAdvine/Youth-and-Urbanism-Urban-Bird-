services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    environment:
      ENVIRONMENT: development
      RELOAD: "true"

  nginx:
    # In dev, nginx is optional – frontend runs on Vite port 5173
    # Keep it running as API proxy only; frontend dev server handles HMR
    ports:
      - "80:80"
    profiles:
      - nginx
