<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Urban Bird{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background: #f5f5f5; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #ffffff; border-radius: 12px; overflow: hidden; }
    .header { background: #782121; padding: 24px 32px; text-align: center; }
    .header h1 { margin: 0; color: #ffffff; font-size: 24px; font-weight: 700; letter-spacing: 2px; }
    .body { padding: 32px; color: #374151; line-height: 1.6; font-size: 15px; }
    .body h2 { color: #111827; font-size: 20px; margin-top: 0; }
    .cta { display: inline-block; margin: 24px 0; background: #782121; color: #ffffff !important;
           padding: 14px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; }
    .footer { background: #f9fafb; border-top: 1px solid #e5e7eb; padding: 20px 32px; text-align: center;
              font-size: 12px; color: #9ca3af; }
    .order-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin: 20px 0; }
    .order-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
    .order-row:last-child { border-bottom: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>URBAN BIRD</h1>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>Urban Bird · Nairobi, Kenya · hello@urbanbird.co.ke</p>
      <p>© 2025 Urban Bird. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
